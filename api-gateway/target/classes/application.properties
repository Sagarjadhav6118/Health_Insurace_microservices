server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=policy-service
spring.cloud.gateway.routes[0].uri=lb://policy-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/policy/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1


spring.cloud.gateway.routes[1].id=claim-service
spring.cloud.gateway.routes[1].uri=lb://claim-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/claim/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1
